<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero's Mods - Stats Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e0e0ea;
    --dim: #7a7a8a;
    --accent: #6c5ce7;
    --green: #00b894;
    --gold: #fdcb6e;
    --orange: #e17055;
    --blue: #74b9ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(108,92,231,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,92,231,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem;
  }

  header { text-align: center; margin-bottom: 3rem; }

  header h1 {
    font-size: 2.8rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
  }

  header p { color: var(--dim); font-size: 1.1rem; margin-top: 0.5rem; }

  .links {
    display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap;
  }

  .links a {
    color: var(--accent); text-decoration: none; font-size: 0.9rem;
    padding: 0.3rem 0.8rem; border: 1px solid var(--border); border-radius: 6px;
    transition: all 0.2s;
  }

  .links a:hover { background: var(--surface2); border-color: var(--accent); }

  .section-title {
    font-size: 1.4rem; font-weight: 700; margin: 2.5rem 0 1rem;
    display: flex; align-items: center; gap: 0.6rem;
  }

  .section-title .dot { width: 8px; height: 8px; border-radius: 50%; }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem;
    transition: border-color 0.2s, transform 0.2s;
  }

  .card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1rem;
  }

  .card-header h3 { font-size: 1.1rem; font-weight: 700; }

  .card-header .game-tag {
    font-size: 0.7rem; font-weight: 500; padding: 0.2rem 0.6rem;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px;
  }

  .tag-oni { background: rgba(78,205,196,0.15); color: #4ecdc4; }
  .tag-zomboid { background: rgba(142,68,173,0.15); color: #8e44ad; }
  .tag-subnautica { background: rgba(247,220,111,0.15); color: #f7dc6f; }
  .tag-subnauticabelowzero { background: rgba(72,219,251,0.15); color: #48dbfb; }
  .tag-minecraft { background: rgba(92,184,92,0.15); color: #5cb85c; }

  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem;
  }

  .stats-row-4 {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem;
  }

  .platform-breakdown {
    margin-top: 0.6rem; padding: 0.4rem 0.6rem;
    background: var(--surface2); border-radius: 6px;
    font-size: 0.75rem; color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
  }

  .stat {
    text-align: center; padding: 0.8rem 0.4rem;
    background: var(--surface2); border-radius: 8px;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem; font-weight: 700;
  }

  .stat-label {
    font-size: 0.7rem; color: var(--dim); text-transform: uppercase;
    letter-spacing: 0.5px; margin-top: 0.2rem;
  }

  .val-green { color: var(--green); }
  .val-gold { color: var(--gold); }
  .val-blue { color: var(--blue); }
  .val-orange { color: var(--orange); }

  .card-chart {
    margin-top: 1rem;
    padding: 0.5rem;
    background: var(--surface2);
    border-radius: 8px;
    height: 120px;
  }

  .card-chart canvas { width: 100% !important; height: 100% !important; }

  .chart-empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--dim); font-size: 0.75rem;
  }

  .totals {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem;
    margin-bottom: 2rem;
  }

  .total-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem; text-align: center;
  }

  .total-card .stat-value { font-size: 2rem; }
  .total-card .stat-label { font-size: 0.85rem; }

  #loading { text-align: center; padding: 4rem; color: var(--dim); }

  .spinner {
    width: 32px; height: 32px; margin: 0 auto 1rem;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .updated {
    text-align: center; color: var(--dim); font-size: 0.8rem;
    margin-top: 2rem; padding: 1rem;
    font-family: 'JetBrains Mono', monospace;
  }

  footer { text-align: center; padding: 2rem; color: var(--dim); font-size: 0.8rem; }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.8rem; }
    .totals { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="container">
  <header>
    <h1>Zero's Mods</h1>
    <p>Live stats dashboard</p>
    <div class="links">
      <a href="https://steamcommunity.com/id/ahunt/myworkshopfiles/">Steam Workshop</a>
      <a href="https://www.nexusmods.com/profile/Zer0TheAbs0lute/mods">Nexus Mods</a>
      <a href="https://modrinth.com/user/ZeroTheAbsolute">Modrinth</a>
      <a href="https://www.curseforge.com/members/zerotheabsolute/projects">CurseForge</a>
      <a href="https://github.com/shikyo13">GitHub</a>
      <a href="https://discord.gg/NrdXnbWzGC">Discord</a>
      <a href="https://zeronexus.net/mods.php">ZeroNexus</a>
      <a href="https://buymeacoffee.com/zerotheabsolute">Support</a>
    </div>
  </header>

  <div id="loading">
    <div class="spinner"></div>
    Fetching live stats...
  </div>

  <div id="content" style="display:none">
    <div class="totals" id="totals"></div>

    <div class="section-title">
      <span class="dot" style="background:var(--green)"></span> Steam Workshop
    </div>
    <div class="grid" id="workshop-grid"></div>

    <div class="section-title" style="margin-top:2rem">
      <span class="dot" style="background:var(--orange)"></span> Nexus Mods
    </div>
    <div class="grid" id="nexus-grid"></div>

    <div class="section-title" style="margin-top:2rem">
      <span class="dot" style="background:#5cb85c"></span> Minecraft
    </div>
    <div class="grid" id="minecraft-grid"></div>

    <div class="updated" id="updated"></div>
  </div>
</div>

<footer>
  <a href="https://github.com/shikyo13">GitHub</a> |
  <a href="https://discord.gg/NrdXnbWzGC">Discord</a> |
  <a href="https://steamcommunity.com/id/ahunt/myworkshopfiles/">Steam Workshop</a> |
  <a href="https://www.nexusmods.com/profile/Zer0TheAbs0lute/mods">Nexus Mods</a> |
  <a href="https://modrinth.com/user/ZeroTheAbsolute">Modrinth</a> |
  <a href="https://www.curseforge.com/members/zerotheabsolute/projects">CurseForge</a> |
  <a href="https://buymeacoffee.com/zerotheabsolute">Buy Me a Coffee</a> |
  <a href="https://www.patreon.com/cw/ZeroTheAbsolute/membership">Patreon</a>
</footer>

<script>
const COLORS = {
  green: '#00b894', gold: '#fdcb6e', blue: '#74b9ff', orange: '#e17055',
  accent: '#6c5ce7', dim: '#7a7a8a'
};

const GAME_TAGS = {
  oni: { label: 'ONI', class: 'tag-oni' },
  zomboid: { label: 'Zomboid', class: 'tag-zomboid' },
  subnautica: { label: 'Subnautica', class: 'tag-subnautica' },
  subnauticabelowzero: { label: 'Below Zero', class: 'tag-subnauticabelowzero' },
  minecraft: { label: 'Minecraft', class: 'tag-minecraft' },
  rimworld: { label: 'RimWorld', class: '' },
  factorio: { label: 'Factorio', class: '' },
};

function num(n) { return Number(n || 0).toLocaleString(); }

function tagFor(game) {
  const t = GAME_TAGS[game] || { label: game, class: '' };
  return `<span class="game-tag ${t.class}">${t.label}</span>`;
}

let chartCounter = 0;

function workshopCard(mod) {
  const cid = `chart-ws-${chartCounter++}`;
  return `
    <div class="card">
      <div class="card-header">
        <h3>${mod.name}</h3>
        ${tagFor(mod.game)}
      </div>
      <div class="stats-row">
        <div class="stat"><div class="stat-value val-green">${num(mod.subscribers)}</div><div class="stat-label">Subscribers</div></div>
        <div class="stat"><div class="stat-value val-gold">${num(mod.favorites)}</div><div class="stat-label">Favorites</div></div>
        <div class="stat"><div class="stat-value val-blue">${num(mod.likes)}</div><div class="stat-label">Ratings</div></div>
      </div>
      <div class="card-chart" id="${cid}" data-mod-id="${mod.id}" data-platform="steam"></div>
    </div>`;
}

function nexusCard(mod) {
  const cid = `chart-nx-${chartCounter++}`;
  return `
    <div class="card">
      <div class="card-header">
        <h3>${mod.name}</h3>
        ${tagFor(mod.game)}
      </div>
      <div class="stats-row">
        <div class="stat"><div class="stat-value val-orange">${num(mod.unique_downloads)}</div><div class="stat-label">Downloads</div></div>
        <div class="stat"><div class="stat-value val-gold">${num(mod.endorsements)}</div><div class="stat-label">Endorsements</div></div>
        <div class="stat"><div class="stat-value val-dim">${mod.version || '?'}</div><div class="stat-label">Version</div></div>
      </div>
      <div class="card-chart" id="${cid}" data-mod-id="${mod.id}" data-platform="nexus"></div>
    </div>`;
}

function minecraftCard(combined) {
  const cid = `chart-mc-${chartCounter++}`;
  return `
    <div class="card">
      <div class="card-header">
        <h3>${combined.name}</h3>
        ${tagFor(combined.game)}
      </div>
      <div class="stats-row">
        <div class="stat"><div class="stat-value val-orange">${num(combined.downloads)}</div><div class="stat-label">Downloads</div></div>
        <div class="stat"><div class="stat-value val-gold">${num(combined.followers)}</div><div class="stat-label">Followers</div></div>
        <div class="stat"><div class="stat-value val-green">${num(combined.thumbs_up)}</div><div class="stat-label">Likes</div></div>
      </div>
      <div class="platform-breakdown">Modrinth: ${num(combined.mr_downloads)} | CurseForge: ${num(combined.cf_downloads)}</div>
      <div class="card-chart" id="${cid}" data-mod-id="${combined.name}" data-platform="minecraft"></div>
    </div>`;
}

function makeGradient(ctx, color) {
  const g = ctx.createLinearGradient(0, 0, 0, 120);
  g.addColorStop(0, color + '40');
  g.addColorStop(1, color + '05');
  return g;
}

function renderChart(containerId, labels, datasets, dualAxis) {
  const container = document.getElementById(containerId);
  if (!labels.length || labels.length < 2) {
    container.innerHTML = '<div class="chart-empty">Collecting data, charts appear after a few updates</div>';
    return;
  }

  const canvas = document.createElement('canvas');
  container.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: datasets.length > 1,
          position: 'top',
          labels: { color: COLORS.dim, font: { size: 10, family: 'Outfit' }, boxWidth: 8, padding: 8 }
        },
        tooltip: {
          backgroundColor: '#1a1a26',
          borderColor: '#2a2a3a',
          borderWidth: 1,
          titleFont: { family: 'Outfit', size: 11 },
          bodyFont: { family: 'JetBrains Mono', size: 11 },
          titleColor: '#e0e0ea',
          bodyColor: '#e0e0ea',
          padding: 8,
          displayColors: true,
          boxWidth: 8,
        }
      },
      scales: Object.assign({
        x: {
          display: true,
          grid: { color: 'rgba(42,42,58,0.3)' },
          ticks: {
            color: COLORS.dim, font: { size: 9, family: 'JetBrains Mono' },
            maxTicksLimit: 6,
            callback: function(val) {
              const d = new Date(this.getLabelForValue(val));
              return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
          }
        },
        y: {
          display: true,
          position: 'left',
          grid: { color: 'rgba(42,42,58,0.3)' },
          ticks: { color: datasets[0]?.borderColor || COLORS.dim, font: { size: 9, family: 'JetBrains Mono' }, maxTicksLimit: 4 },
          beginAtZero: true,
        }
      }, dualAxis ? {
        y1: {
          display: true,
          position: 'right',
          grid: { drawOnChartArea: false },
          ticks: { color: datasets[1]?.borderColor || COLORS.gold, font: { size: 9, family: 'JetBrains Mono' }, maxTicksLimit: 4 },
          beginAtZero: true,
        }
      } : {}),
      elements: {
        point: { radius: 3, hoverRadius: 5, borderWidth: 2 },
        line: { tension: 0.3, borderWidth: 2.5 }
      }
    }
  });
}

function buildCharts(history) {
  document.querySelectorAll('.card-chart').forEach(container => {
    const modId = container.dataset.modId;
    const platform = container.dataset.platform;

    const labels = [];
    const seriesMap = {};

    history.forEach(snap => {
      labels.push(snap.t);
      if (platform === 'minecraft') {
        // Combined Modrinth + CurseForge downloads
        const mrMods = snap.m || [];
        const cfMods = snap.c || [];
        const mrMod = mrMods.find(m => m.name === modId);
        const cfMod = cfMods.find(m => m.name === modId);
        const dl = (mrMod ? mrMod.downloads : 0) + (cfMod ? cfMod.downloads : 0);
        if (!seriesMap.Downloads) seriesMap.Downloads = [];
        seriesMap.Downloads.push(dl);
      } else {
        const mods = platform === 'steam' ? (snap.w || []) : platform === 'curseforge' ? (snap.c || []) : (snap.n || []);
        const mod = mods.find(m => m.id === modId);
        if (mod) {
          if (platform === 'steam') {
            if (!seriesMap.Subscribers) seriesMap.Subscribers = [];
            if (!seriesMap.Favorites) seriesMap.Favorites = [];
            seriesMap.Subscribers.push(mod.subscribers);
            seriesMap.Favorites.push(mod.favorites);
          } else if (platform === 'curseforge') {
            if (!seriesMap.Downloads) seriesMap.Downloads = [];
            if (!seriesMap.Likes) seriesMap.Likes = [];
            seriesMap.Downloads.push(mod.downloads);
            seriesMap.Likes.push(mod.thumbs_up || 0);
          } else {
            if (!seriesMap.Downloads) seriesMap.Downloads = [];
            if (!seriesMap.Endorsements) seriesMap.Endorsements = [];
            seriesMap.Downloads.push(mod.unique_downloads);
            seriesMap.Endorsements.push(mod.endorsements);
          }
        }
      }
    });

    const colorMap = {
      Subscribers: COLORS.green,
      Favorites: COLORS.gold,
      Downloads: COLORS.orange,
      Endorsements: COLORS.gold,
      Followers: COLORS.gold,
      Likes: COLORS.green,
    };

    const entries = Object.entries(seriesMap);
    const datasets = entries.map(([label, data], i) => {
      const color = colorMap[label] || COLORS.accent;
      return {
        label,
        data,
        borderColor: color,
        backgroundColor: color + '20',
        fill: false,
        yAxisID: i === 0 ? 'y' : 'y1',
      };
    });

    renderChart(container.id, labels, datasets, entries.length > 1);
  });
}

async function init() {
  let data;
  try {
    // Fetch via GitHub API to bypass all caching (Pages CDN + raw CDN)
    const apiResp = await fetch('https://api.github.com/repos/shikyo13/GameModding/contents/docs/stats/data.json');
    const apiData = await apiResp.json();
    const resp = { json: async () => JSON.parse(atob(apiData.content)) };
    data = await resp.json();
  } catch (e) {
    document.getElementById('loading').innerHTML = 'Failed to load stats data. Waiting for first GitHub Actions run.';
    return;
  }

  const ws = data.workshop || [];
  const nx = data.nexus || [];
  const mr = data.modrinth || [];
  const cf = data.curseforge || [];
  const history = data.history || [];

  let totalSubs = 0, totalFavs = 0, totalDL = 0, totalRatings = 0;
  ws.forEach(m => { totalSubs += m.subscribers; totalFavs += m.favorites; totalRatings += (m.likes || 0); });
  nx.forEach(m => { totalDL += m.unique_downloads; });
  mr.forEach(m => { totalDL += m.downloads; });
  cf.forEach(m => { totalDL += m.downloads; totalRatings += (m.thumbs_up || 0); });

  document.getElementById('totals').innerHTML = `
    <div class="total-card"><div class="stat-value val-green">${num(totalSubs)}</div><div class="stat-label">Workshop Subscribers</div></div>
    <div class="total-card"><div class="stat-value val-orange">${num(totalDL)}</div><div class="stat-label">Total Downloads</div></div>
    <div class="total-card"><div class="stat-value val-gold">${num(totalFavs)}</div><div class="stat-label">Total Favorites</div></div>
    <div class="total-card"><div class="stat-value val-blue">${num(totalRatings)}</div><div class="stat-label">Total Ratings</div></div>
  `;

  document.getElementById('workshop-grid').innerHTML = ws.map(workshopCard).join('');
  document.getElementById('nexus-grid').innerHTML = nx.map(nexusCard).join('');

  // Build combined Minecraft cards from Modrinth + CurseForge
  const mcMods = {};
  mr.forEach(m => {
    if (!mcMods[m.name]) mcMods[m.name] = { name: m.name, game: m.game, downloads: 0, mr_downloads: 0, cf_downloads: 0, followers: 0, thumbs_up: 0 };
    mcMods[m.name].downloads += m.downloads;
    mcMods[m.name].mr_downloads = m.downloads;
    mcMods[m.name].followers = m.followers;
  });
  cf.forEach(m => {
    if (!mcMods[m.name]) mcMods[m.name] = { name: m.name, game: m.game, downloads: 0, mr_downloads: 0, cf_downloads: 0, followers: 0, thumbs_up: 0 };
    mcMods[m.name].downloads += m.downloads;
    mcMods[m.name].cf_downloads = m.downloads;
    mcMods[m.name].thumbs_up = m.thumbs_up || 0;
  });
  const mcList = Object.values(mcMods);
  document.getElementById('minecraft-grid').innerHTML = mcList.length ? mcList.map(minecraftCard).join('') : '<div style="color:var(--dim);font-size:0.9rem;padding:1rem">Collecting data, cards appear after first workflow run</div>';

  // Render charts from history
  buildCharts(history);

  const updated = data.updated ? new Date(data.updated).toLocaleString() : 'unknown';
  const historyHours = history.length > 1
    ? ((new Date(history[history.length-1].t) - new Date(history[0].t)) / 3600000).toFixed(1)
    : '0';
  document.getElementById('updated').textContent = `Data from: ${updated} (updates every 8 min, ${history.length} data points over ${historyHours}h)`;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

init();
// Auto-refresh every 8 minutes to match workflow
setInterval(() => location.reload(), 8 * 60 * 1000);
</script>
</body>
</html>

name: Discord Monitor & Stats

on:
  schedule:
    - cron: '*/8 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-and-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: .monitor-state.json
          key: monitor-state-${{ github.run_id }}
          restore-keys: |
            monitor-state-

      - name: Initialize state
        run: |
          if [ ! -f .monitor-state.json ]; then
            echo '{"nexus": {}, "workshop": {}, "milestones": {}}' > .monitor-state.json
          fi

      - name: Fetch Steam Workshop stats
        env:
          DISCORD_WEBHOOK_WORKSHOP: ${{ secrets.DISCORD_WEBHOOK_WORKSHOP }}
          DISCORD_WEBHOOK_STATS: ${{ secrets.DISCORD_WEBHOOK_STATS }}
        run: |
          WORKSHOP_IDS=(
            "3682732647:Duplicant Status Bar:oni"
            "3667874678:Barricade Context Menu:zomboid"
            "3402208866:Barricades Hurt Zombies:zomboid"
          )

          STATE=$(cat .monitor-state.json)
          STATE=$(echo "$STATE" | jq '. + {milestones: (.milestones // {})}')
          MILESTONES=(10 25 50 100 250 500 1000 2500 5000 10000)

          # Build data.json workshop array
          WS_JSON="["

          for entry in "${WORKSHOP_IDS[@]}"; do
            IFS=':' read -r file_id mod_name game <<< "$entry"
            echo "Checking Workshop: $mod_name ($file_id)"

            RESPONSE=$(curl -s -X POST \
              -d "itemcount=1&publishedfileids[0]=$file_id" \
              "https://api.steampowered.com/ISteamRemoteStorage/GetPublishedFileDetails/v1/")

            UPDATED=$(echo "$RESPONSE" | jq -r '.response.publishedfiledetails[0].time_updated // 0')
            TITLE=$(echo "$RESPONSE" | jq -r '.response.publishedfiledetails[0].title // "Unknown"')
            SUBS=$(echo "$RESPONSE" | jq -r '.response.publishedfiledetails[0].subscriptions // 0')
            FAVS=$(echo "$RESPONSE" | jq -r '.response.publishedfiledetails[0].favorited // 0')
            VIEWS=$(echo "$RESPONSE" | jq -r '.response.publishedfiledetails[0].views // 0')
            echo "  Subs: $SUBS | Favs: $FAVS | Views: $VIEWS"

            WS_JSON="$WS_JSON{\"id\":\"$file_id\",\"name\":\"$mod_name\",\"game\":\"$game\",\"platform\":\"steam\",\"subscribers\":$SUBS,\"favorites\":$FAVS,\"views\":$VIEWS},"

            LAST_SEEN=$(echo "$STATE" | jq -r ".workshop[\"$file_id\"] // 0")

            # Update detection
            if [ -n "$DISCORD_WEBHOOK_WORKSHOP" ] && [ "$UPDATED" -gt "$LAST_SEEN" ] && [ "$LAST_SEEN" -ne 0 ]; then
              echo "Workshop update detected: $mod_name"
              curl -s -H "Content-Type: application/json" \
                -d "{\"embeds\":[{\"title\":\"Steam Workshop Update: $TITLE\",\"color\":1785874,\"fields\":[{\"name\":\"Mod\",\"value\":\"$mod_name\",\"inline\":true},{\"name\":\"Subscribers\",\"value\":\"$SUBS\",\"inline\":true},{\"name\":\"Favorites\",\"value\":\"$FAVS\",\"inline\":true}],\"url\":\"https://steamcommunity.com/sharedfiles/filedetails/?id=$file_id\",\"footer\":{\"text\":\"Steam Workshop\"}}]}" \
                "$DISCORD_WEBHOOK_WORKSHOP"
            fi

            # Subscriber milestones
            LAST_MS=$(echo "$STATE" | jq -r ".milestones[\"subs_$file_id\"] // -1")
            if [ "$LAST_MS" = "-1" ]; then
              SEED=0; for ms in "${MILESTONES[@]}"; do [ "$SUBS" -ge "$ms" ] && SEED=$ms; done
              STATE=$(echo "$STATE" | jq ".milestones[\"subs_$file_id\"] = $SEED")
            else
              for ms in "${MILESTONES[@]}"; do
                if [ "$SUBS" -ge "$ms" ] && [ "$LAST_MS" -lt "$ms" ] && [ -n "$DISCORD_WEBHOOK_STATS" ]; then
                  echo "MILESTONE: $mod_name $ms subscribers"
                  curl -s -H "Content-Type: application/json" \
                    -d "{\"embeds\":[{\"title\":\"Milestone: $mod_name reached $ms subscribers!\",\"description\":\"$mod_name just hit **$ms** subscribers on Steam Workshop!\",\"color\":16766720,\"fields\":[{\"name\":\"Subscribers\",\"value\":\"$SUBS\",\"inline\":true},{\"name\":\"Favorites\",\"value\":\"$FAVS\",\"inline\":true},{\"name\":\"Views\",\"value\":\"$VIEWS\",\"inline\":true}],\"url\":\"https://steamcommunity.com/sharedfiles/filedetails/?id=$file_id\",\"footer\":{\"text\":\"Steam Workshop Milestone\"}}]}" \
                    "$DISCORD_WEBHOOK_STATS"
                  STATE=$(echo "$STATE" | jq ".milestones[\"subs_$file_id\"] = $ms")
                fi
              done
            fi

            # Favorites milestones
            LAST_FMS=$(echo "$STATE" | jq -r ".milestones[\"favs_$file_id\"] // -1")
            if [ "$LAST_FMS" = "-1" ]; then
              SEED=0; for ms in "${MILESTONES[@]}"; do [ "$FAVS" -ge "$ms" ] && SEED=$ms; done
              STATE=$(echo "$STATE" | jq ".milestones[\"favs_$file_id\"] = $SEED")
            else
              for ms in "${MILESTONES[@]}"; do
                if [ "$FAVS" -ge "$ms" ] && [ "$LAST_FMS" -lt "$ms" ] && [ -n "$DISCORD_WEBHOOK_STATS" ]; then
                  echo "MILESTONE: $mod_name $ms favorites"
                  curl -s -H "Content-Type: application/json" \
                    -d "{\"embeds\":[{\"title\":\"Milestone: $mod_name reached $ms favorites!\",\"color\":16753920,\"fields\":[{\"name\":\"Favorites\",\"value\":\"$FAVS\",\"inline\":true},{\"name\":\"Subscribers\",\"value\":\"$SUBS\",\"inline\":true}],\"url\":\"https://steamcommunity.com/sharedfiles/filedetails/?id=$file_id\",\"footer\":{\"text\":\"Steam Workshop Milestone\"}}]}" \
                    "$DISCORD_WEBHOOK_STATS"
                  STATE=$(echo "$STATE" | jq ".milestones[\"favs_$file_id\"] = $ms")
                fi
              done
            fi

            STATE=$(echo "$STATE" | jq ".workshop[\"$file_id\"] = $UPDATED")
          done

          WS_JSON="${WS_JSON%,}]"
          echo "$WS_JSON" > /tmp/ws.json
          echo "$STATE" > .monitor-state.json

      - name: Fetch Nexus Mods stats
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
          DISCORD_WEBHOOK_NEXUS: ${{ secrets.DISCORD_WEBHOOK_NEXUS }}
          DISCORD_WEBHOOK_STATS: ${{ secrets.DISCORD_WEBHOOK_STATS }}
        run: |
          NEXUS_MODS=(
            "subnautica:3046:CameraStalkerGuard"
            "subnautica:3047:Power Saver"
            "subnautica:3050:Beacon Color Picker"
            "subnauticabelowzero:638:Beacon Color Picker BZ"
            "subnauticabelowzero:639:Power Saver BZ"
          )

          STATE=$(cat .monitor-state.json)
          MILESTONES=(10 25 50 100 250 500 1000 2500 5000 10000)
          NX_JSON="["

          if [ -n "$NEXUS_API_KEY" ]; then
            for entry in "${NEXUS_MODS[@]}"; do
              IFS=':' read -r domain mod_id mod_name <<< "$entry"
              echo "Checking Nexus: $mod_name ($domain/$mod_id)"

              RESP=$(curl -s -H "apikey: $NEXUS_API_KEY" \
                "https://api.nexusmods.com/v1/games/$domain/mods/$mod_id.json")

              UPDATED=$(echo "$RESP" | jq -r '.updated_timestamp // 0')
              VERSION=$(echo "$RESP" | jq -r '.version // "?"')
              SUMMARY=$(echo "$RESP" | jq -r '.summary // ""')
              DOWNLOADS=$(echo "$RESP" | jq -r '.mod_downloads // 0')
              UNIQUE_DL=$(echo "$RESP" | jq -r '.mod_unique_downloads // 0')
              ENDORSEMENTS=$(echo "$RESP" | jq -r '.endorsement_count // 0')
              echo "  DL: $UNIQUE_DL | Endorsements: $ENDORSEMENTS"

              NX_JSON="$NX_JSON{\"id\":\"$mod_id\",\"domain\":\"$domain\",\"name\":\"$mod_name\",\"game\":\"$domain\",\"platform\":\"nexus\",\"downloads\":$DOWNLOADS,\"unique_downloads\":$UNIQUE_DL,\"endorsements\":$ENDORSEMENTS,\"version\":\"$VERSION\"},"

              LAST_SEEN=$(echo "$STATE" | jq -r ".nexus[\"${domain}_${mod_id}\"] // 0")

              # Update detection
              if [ -n "$DISCORD_WEBHOOK_NEXUS" ] && [ "$UPDATED" -gt "$LAST_SEEN" ] && [ "$LAST_SEEN" -ne 0 ]; then
                echo "Nexus update detected: $mod_name"
                curl -s -H "Content-Type: application/json" \
                  -d "{\"embeds\":[{\"title\":\"Nexus Mods Update: $mod_name\",\"description\":\"$SUMMARY\",\"color\":14051644,\"fields\":[{\"name\":\"Version\",\"value\":\"$VERSION\",\"inline\":true},{\"name\":\"Downloads\",\"value\":\"$DOWNLOADS\",\"inline\":true},{\"name\":\"Endorsements\",\"value\":\"$ENDORSEMENTS\",\"inline\":true}],\"url\":\"https://www.nexusmods.com/$domain/mods/$mod_id\",\"footer\":{\"text\":\"Nexus Mods\"}}]}" \
                  "$DISCORD_WEBHOOK_NEXUS"
              fi

              # Download milestones
              LAST_DMS=$(echo "$STATE" | jq -r ".milestones[\"dl_${domain}_${mod_id}\"] // -1")
              if [ "$LAST_DMS" = "-1" ]; then
                SEED=0; for ms in "${MILESTONES[@]}"; do [ "$UNIQUE_DL" -ge "$ms" ] && SEED=$ms; done
                STATE=$(echo "$STATE" | jq ".milestones[\"dl_${domain}_${mod_id}\"] = $SEED")
              else
                for ms in "${MILESTONES[@]}"; do
                  if [ "$UNIQUE_DL" -ge "$ms" ] && [ "$LAST_DMS" -lt "$ms" ] && [ -n "$DISCORD_WEBHOOK_STATS" ]; then
                    echo "MILESTONE: $mod_name $ms downloads"
                    curl -s -H "Content-Type: application/json" \
                      -d "{\"embeds\":[{\"title\":\"Milestone: $mod_name reached $ms downloads!\",\"color\":14051644,\"fields\":[{\"name\":\"Downloads\",\"value\":\"$UNIQUE_DL\",\"inline\":true},{\"name\":\"Endorsements\",\"value\":\"$ENDORSEMENTS\",\"inline\":true}],\"url\":\"https://www.nexusmods.com/$domain/mods/$mod_id\",\"footer\":{\"text\":\"Nexus Mods Milestone\"}}]}" \
                      "$DISCORD_WEBHOOK_STATS"
                    STATE=$(echo "$STATE" | jq ".milestones[\"dl_${domain}_${mod_id}\"] = $ms")
                  fi
                done
              fi

              STATE=$(echo "$STATE" | jq ".nexus[\"${domain}_${mod_id}\"] = $UPDATED")
              sleep 0.5
            done
          fi

          NX_JSON="${NX_JSON%,}]"
          echo "$NX_JSON" > /tmp/nx.json
          echo "$STATE" > .monitor-state.json

      - name: Fetch Modrinth stats
        env:
          DISCORD_WEBHOOK_STATS: ${{ secrets.DISCORD_WEBHOOK_STATS }}
        run: |
          MODRINTH_MODS=(
            "dpXerb2j:QuickStack & Craft:minecraft"
          )

          STATE=$(cat .monitor-state.json)
          MILESTONES=(10 25 50 100 250 500 1000 2500 5000 10000)
          MR_JSON="["

          for entry in "${MODRINTH_MODS[@]}"; do
            IFS=':' read -r project_id mod_name game <<< "$entry"
            echo "Checking Modrinth: $mod_name ($project_id)"

            RESP=$(curl -s -H "User-Agent: ZeroModStats/1.0" \
              "https://api.modrinth.com/v2/project/$project_id")

            DOWNLOADS=$(echo "$RESP" | jq -r '.downloads // 0')
            FOLLOWERS=$(echo "$RESP" | jq -r '.followers // 0')
            UPDATED=$(echo "$RESP" | jq -r '.updated // ""')
            SLUG=$(echo "$RESP" | jq -r '.slug // ""')
            echo "  Downloads: $DOWNLOADS | Followers: $FOLLOWERS"

            MR_JSON="$MR_JSON{\"id\":\"$project_id\",\"slug\":\"$SLUG\",\"name\":\"$mod_name\",\"game\":\"$game\",\"platform\":\"modrinth\",\"downloads\":$DOWNLOADS,\"followers\":$FOLLOWERS},"

            # Download milestones
            LAST_DMS=$(echo "$STATE" | jq -r ".milestones[\"mr_dl_${project_id}\"] // -1")
            if [ "$LAST_DMS" = "-1" ]; then
              SEED=0; for ms in "${MILESTONES[@]}"; do [ "$DOWNLOADS" -ge "$ms" ] && SEED=$ms; done
              STATE=$(echo "$STATE" | jq ".milestones[\"mr_dl_${project_id}\"] = $SEED")
            else
              for ms in "${MILESTONES[@]}"; do
                if [ "$DOWNLOADS" -ge "$ms" ] && [ "$LAST_DMS" -lt "$ms" ] && [ -n "$DISCORD_WEBHOOK_STATS" ]; then
                  echo "MILESTONE: $mod_name $ms downloads on Modrinth"
                  curl -s -H "Content-Type: application/json" \
                    -d "{\"embeds\":[{\"title\":\"Milestone: $mod_name reached $ms downloads!\",\"color\":1941120,\"fields\":[{\"name\":\"Downloads\",\"value\":\"$DOWNLOADS\",\"inline\":true},{\"name\":\"Followers\",\"value\":\"$FOLLOWERS\",\"inline\":true}],\"url\":\"https://modrinth.com/mod/$SLUG\",\"footer\":{\"text\":\"Modrinth Milestone\"}}]}" \
                    "$DISCORD_WEBHOOK_STATS"
                  STATE=$(echo "$STATE" | jq ".milestones[\"mr_dl_${project_id}\"] = $ms")
                fi
              done
            fi

            sleep 0.5
          done

          MR_JSON="${MR_JSON%,}]"
          echo "$MR_JSON" > /tmp/mr.json
          echo "$STATE" > .monitor-state.json

      - name: Generate data.json for GitHub Pages
        run: |
          WS_JSON=$(cat /tmp/ws.json 2>/dev/null || echo '[]')
          NX_JSON=$(cat /tmp/nx.json 2>/dev/null || echo '[]')
          MR_JSON=$(cat /tmp/mr.json 2>/dev/null || echo '[]')
          NOW=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          # Load existing history or start fresh
          if [ -f docs/stats/data.json ]; then
            EXISTING_HISTORY=$(cat docs/stats/data.json | jq -c '.history // []')
          else
            EXISTING_HISTORY="[]"
          fi

          # Build current snapshot for history
          SNAPSHOT="{\"t\":\"$NOW\",\"w\":$WS_JSON,\"n\":$NX_JSON,\"m\":$MR_JSON}"

          # Append to history, keep last 180 entries (~1 day at 8min intervals)
          HISTORY=$(echo "$EXISTING_HISTORY" | jq -c --argjson snap "$SNAPSHOT" '. + [$snap] | .[-180:]')

          cat > docs/stats/data.json << JSONEOF
          {
            "updated": "$NOW",
            "workshop": $WS_JSON,
            "nexus": $NX_JSON,
            "modrinth": $MR_JSON,
            "history": $HISTORY
          }
          JSONEOF

          ENTRIES=$(echo "$HISTORY" | jq 'length')
          echo "data.json updated with $ENTRIES history entries"

      - name: Update Discord #mod-stats embed
        env:
          DISCORD_WEBHOOK_STATS: ${{ secrets.DISCORD_WEBHOOK_STATS }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_STATS" ]; then exit 0; fi

          STATE=$(cat .monitor-state.json)
          WS_JSON=$(cat /tmp/ws.json 2>/dev/null || echo '[]')
          NX_JSON=$(cat /tmp/nx.json 2>/dev/null || echo '[]')
          MR_JSON=$(cat /tmp/mr.json 2>/dev/null || echo '[]')

          # Build embed fields from workshop data
          FIELDS=""
          TOTAL_SUBS=0; TOTAL_FAVS=0; TOTAL_DL=0

          while IFS= read -r mod; do
            NAME=$(echo "$mod" | jq -r '.name')
            SUBS=$(echo "$mod" | jq -r '.subscribers')
            FAVS=$(echo "$mod" | jq -r '.favorites')
            VIEWS=$(echo "$mod" | jq -r '.views')
            TOTAL_SUBS=$((TOTAL_SUBS + SUBS))
            TOTAL_FAVS=$((TOTAL_FAVS + FAVS))
            FIELDS="$FIELDS{\"name\":\"$NAME\",\"value\":\"Subs: **$SUBS** | Favs: **$FAVS** | Views: **$VIEWS**\",\"inline\":false},"
          done < <(echo "$WS_JSON" | jq -c '.[]')

          while IFS= read -r mod; do
            NAME=$(echo "$mod" | jq -r '.name')
            DL=$(echo "$mod" | jq -r '.unique_downloads')
            ENDORSE=$(echo "$mod" | jq -r '.endorsements')
            TOTAL_DL=$((TOTAL_DL + DL))
            FIELDS="$FIELDS{\"name\":\"$NAME (Nexus)\",\"value\":\"Downloads: **$DL** | Endorsements: **$ENDORSE**\",\"inline\":false},"
          done < <(echo "$NX_JSON" | jq -c '.[]')

          while IFS= read -r mod; do
            NAME=$(echo "$mod" | jq -r '.name')
            DL=$(echo "$mod" | jq -r '.downloads')
            FOLLOWS=$(echo "$mod" | jq -r '.followers')
            TOTAL_DL=$((TOTAL_DL + DL))
            FIELDS="$FIELDS{\"name\":\"$NAME (Modrinth)\",\"value\":\"Downloads: **$DL** | Followers: **$FOLLOWS**\",\"inline\":false},"
          done < <(echo "$MR_JSON" | jq -c '.[]')

          FIELDS="${FIELDS%,}"

          EMBED="{\"embeds\":[{\"title\":\"Zero's Mods - Live Stats\",\"description\":\"**Totals:** $TOTAL_SUBS subscribers | $TOTAL_FAVS favorites | $TOTAL_DL downloads\",\"color\":7090918,\"fields\":[$FIELDS],\"footer\":{\"text\":\"Updates every 8 min | $(date -u '+%Y-%m-%d %H:%M UTC')\"},\"url\":\"https://shikyo13.github.io/GameModding/stats/\"}]}"

          STATS_MSG_ID=$(echo "$STATE" | jq -r '.stats_message_id // ""')

          if [ -n "$STATS_MSG_ID" ] && [ "$STATS_MSG_ID" != "null" ]; then
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH -H "Content-Type: application/json" -d "$EMBED" "$DISCORD_WEBHOOK_STATS/messages/$STATS_MSG_ID")
            if [ "$HTTP" = "200" ]; then
              echo "Updated stats message $STATS_MSG_ID"
            else
              echo "Edit failed ($HTTP), posting new"
              STATS_MSG_ID=""
            fi
          fi

          if [ -z "$STATS_MSG_ID" ] || [ "$STATS_MSG_ID" = "null" ]; then
            RESP=$(curl -s -X POST -H "Content-Type: application/json" -d "$EMBED" "$DISCORD_WEBHOOK_STATS?wait=true")
            NEW_ID=$(echo "$RESP" | jq -r '.id // ""')
            if [ -n "$NEW_ID" ] && [ "$NEW_ID" != "null" ]; then
              STATE=$(echo "$STATE" | jq ".stats_message_id = \"$NEW_ID\"")
              echo "Posted new stats message: $NEW_ID"
            fi
          fi

          echo "$STATE" > .monitor-state.json

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/stats/data.json
          git diff --cached --quiet || (git commit -m "Update stats data [skip ci]" && git push)

